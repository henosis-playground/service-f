lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

overrides:
  '@henosis/core': file:../platform/packages/core

importers:

  .:
    dependencies:
      '@henosis/core':
        specifier: file:../platform/packages/core
        version: file:../platform/packages/core
      '@henosis/platform-cloudflare':
        specifier: file:../platform/packages/platform-cloudflare
        version: file:../platform/packages/platform-cloudflare
      '@henosis/service-a':
        specifier: file:../service-a
        version: file:../service-a
    devDependencies:
      typescript:
        specifier: 5.9.3
        version: 5.9.3

packages:

  '@henosis/core@file:../platform/packages/core':
    resolution: {directory: ../platform/packages/core, type: directory}

  '@henosis/platform-cloudflare@file:../platform/packages/platform-cloudflare':
    resolution: {directory: ../platform/packages/platform-cloudflare, type: directory}

  '@henosis/platform-k8s@file:../platform/packages/platform-k8s':
    resolution: {directory: ../platform/packages/platform-k8s, type: directory}

  '@henosis/service-a@file:../service-a':
    resolution: {directory: ../service-a, type: directory}
    engines: {node: '>=22'}

  typescript@5.9.3:
    resolution: {integrity: sha512-jl1vZzPDinLr9eUt3J/t7V6FgNEw9QjvBPdysz9KfQDD41fQrC2Y4vKQdiaUpFT4bXlb1RHhLpp8wtm6M5TgSw==}
    engines: {node: '>=14.17'}
    hasBin: true

snapshots:

  '@henosis/core@file:../platform/packages/core': {}

  '@henosis/platform-cloudflare@file:../platform/packages/platform-cloudflare':
    dependencies:
      '@henosis/core': file:../platform/packages/core

  '@henosis/platform-k8s@file:../platform/packages/platform-k8s':
    dependencies:
      '@henosis/core': file:../platform/packages/core

  '@henosis/service-a@file:../service-a':
    dependencies:
      '@henosis/core': file:../platform/packages/core
      '@henosis/platform-k8s': file:../platform/packages/platform-k8s

  typescript@5.9.3: {}
