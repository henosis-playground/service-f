<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Henosis value flow</title><style>body{font:16px system-ui;max-width:48rem;margin:4rem auto;padding:0 1rem}code{background:#eee;padding:.15rem .35rem}pre{background:#111;color:#b7ffb7;padding:1rem;overflow:auto}</style></head><body><h1>Henosis value flow</h1><p>This frontend received the backend's plan-time URL through graph output <code>service-e.url</code>. The backend received PostgREST through <code>service-d.restUrl</code>.</p><pre id="result">Loading browser → frontend → backend → PostgREST…</pre><script src="/config.js"></script><script>Promise.all(['/health','/items'].map(path=>fetch(window.HENOSIS_BACKEND_URL+path).then(async r=>({status:r.status,body:await r.json()})))).then(([health,items])=>result.textContent=JSON.stringify({frontend:location.origin,backend:window.HENOSIS_BACKEND_URL,health,items},null,2)).catch(e=>result.textContent=e.stack)</script></body></html>
