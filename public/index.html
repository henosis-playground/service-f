<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Henosis Cloudflare demo</title><style>body{font:16px system-ui;max-width:48rem;margin:4rem auto;padding:0 1rem}pre{background:#111;color:#b7ffb7;padding:1rem;overflow:auto}</style></head><body><h1>Henosis value propagation</h1><p>This static-assets Worker receives service-e's plan-time URL through <code>BACKEND_URL</code>.</p><pre id="result">Loading…</pre><script src="/config.js"></script><script>fetch(window.HENOSIS_BACKEND_URL + '/health').then(r=>r.json()).then(v=>result.textContent=JSON.stringify({backend:window.HENOSIS_BACKEND_URL,response:v},null,2)).catch(e=>result.textContent=e.stack)</script></body></html>
